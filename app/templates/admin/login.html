<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 460px;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Entrar no Admin</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('admin.login_post') }}">
          {{ form.csrf_token }}
          <div class="mb-3">
            <label class="form-label">Email</label>
            {{ form.email(class="form-control") }}
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            {{ form.password(class="form-control") }}
          </div>
          <button class="btn btn-dark w-100" type="submit">Entrar</button>
        </form>
      </div>
    </div>
    <div class="text-center small text-muted mt-3">
      <a href="{{ url_for('site.home') }}">Voltar ao site</a>
    </div>
  </div>
</body>
</html>
